{% assign repo_url =  include.repository | split: '/' %}

{% if site.data.repositories.github_users contains repo_url.first %}
  {% assign show_owner = false %}
{% else %}
  {% assign show_owner = true %}
{% endif %}

<div class="repo p-2 text-center">
  <a href="https://github.com/{{ include.repository }}">
    <img class="repo-img-light w-100"
     src="https://img.shields.io/github/stars/{{ repo_url.first }}/{{ repo_url.last }}?style=flat-square">
<img class="repo-img-dark w-100"
     src="https://img.shields.io/github/stars/{{ repo_url.first }}/{{ repo_url.last }}?style=flat-square&color=white">

  </a>
</div>
